<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ponder — Fish Pond</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1600px;
    height: 900px;
    background: #0a2a38;
    overflow: hidden;
  }

  #pond { display:block; width:1600px; height:900px; }

  #waiting {
    position:fixed; top:50%; left:50%;
    transform:translate(-50%,-50%);
    text-align:center; pointer-events:none; z-index:10;
    animation: breathe 4s ease-in-out infinite;
  }
  #waiting.hidden { display:none; }
  @keyframes breathe {
    0%,100%{ opacity:.45; transform:translate(-50%,-50%) translateY(0); }
    50%    { opacity:.85; transform:translate(-50%,-50%) translateY(-8px); }
  }
  #waiting h1 {
    font-family:'Georgia',serif; font-size:52px; font-weight:normal; font-style:italic;
    color:rgba(220,240,245,.85); letter-spacing:.22em;
    text-shadow:0 0 80px rgba(100,200,230,.4); margin-bottom:16px;
  }
  #waiting p {
    font-family:monospace; font-size:14px; letter-spacing:.3em;
    color:rgba(180,220,240,.5); text-transform:uppercase;
  }

  #counter {
    position:fixed; bottom:24px; right:28px;
    font-family:monospace; font-size:11px;
    color:rgba(180,220,240,.35); letter-spacing:.15em; pointer-events:none; z-index:10;
  }
</style>
</head>
<body>
<canvas id="pond" width="1600" height="900"></canvas>
<div id="waiting"><h1>ponder</h1><p>draw a fish to begin</p></div>
<div id="counter">0 / 8 fish</div>

<script>
'use strict';

// ══════════════════════════════════════════════════ CONFIG ══
const W           = 1600;
const H           = 900;
const MAX_FISH    = 8;
const POLL_MS     = 1500;   // check server every 1.5s
const SENSOR_POLL_MS = 200; // check sensor every 200ms for responsiveness
const ENTRY_DELAY = 12;     // fish appears 12s after sent (4s countdown + 8s timer)
const SERVER      = '';     // same origin — served by server.py
const SENSOR_THRESHOLD = 300;  // sensor value above this speeds up fish
const SPEED_MULTIPLIER = 2.0;  // 200% speed when sensor triggered

// Current speed multiplier (1.0 = normal, 2.0 = 200% speed)
let currentSpeedMultiplier = 1.0;

// Oval swimming path (centre + radii)
const PATH_CX = W * 0.50;
const PATH_CY = H * 0.50;
const PATH_RX = W * 0.45;
const PATH_RY = H * 0.42;

// ══════════════════════════════════════════════════ CANVAS ══
const canvas = document.getElementById('pond');
const ctx    = canvas.getContext('2d');

// ══════════════════════════════════════════════════ BACKGROUND ══
const bgImg  = new Image();
bgImg.src    = `${SERVER}/pond_bg.png`;
let bgLoaded = false;
bgImg.onload = () => { bgLoaded = true; };

// ══════════════════════════════════════════════════ RIPPLES ══
class Ripple {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.rings = [];
    // Create multiple rings that expand outward with large delays
    for (let i = 0; i < 3; i++) {
      // Generate random arc segments (incomplete circles)
      const arcs = [];
      let angle = Math.random() * Math.PI * 2;
      const numArcs = 2 + Math.floor(Math.random() * 3);  // 2-4 arcs per ring
      for (let a = 0; a < numArcs; a++) {
        const arcLength = 0.4 + Math.random() * 0.8;  // arc spans 0.4-1.2 radians
        const gapLength = 0.3 + Math.random() * 0.6;  // gap spans 0.3-0.9 radians
        arcs.push({ start: angle, end: angle + arcLength });
        angle += arcLength + gapLength;
      }

      this.rings.push({
        radius: 5,
        maxRadius: 150 + Math.random() * 60,
        alpha: 0.6,
        delay: i * 60,  // large stagger between rings
        started: false,
        arcs: arcs
      });
    }
    this.frame = 0;
  }

  get alive() {
    return this.rings.some(r => r.alpha > 0.01);
  }

  update() {
    this.frame++;
    for (const ring of this.rings) {
      if (this.frame >= ring.delay) {
        ring.started = true;
      }
      if (ring.started && ring.alpha > 0) {
        ring.radius += 0.25;  // very slow expansion
        // Fade out very slowly as it expands
        const progress = ring.radius / ring.maxRadius;
        ring.alpha = Math.max(0, (1 - progress * progress * progress) * 0.6);
      }
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';

    for (const ring of this.rings) {
      if (!ring.started || ring.alpha <= 0) continue;

      ctx.globalAlpha = ring.alpha;

      // Draw incomplete circular arcs
      for (const arc of ring.arcs) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, ring.radius, arc.start, arc.end);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

const ripples = [];

function spawnRipple(x, y) {
  ripples.push(new Ripple(x, y));
}

// ══════════════════════════════════════════════════ LILLYPADS ══
const lillypadImg = new Image();
lillypadImg.src = `${SERVER}/lillypad.png`;
let lillypadImgLoaded = false;
lillypadImg.onload = () => { lillypadImgLoaded = true; };

const lillypadWithLillyImg = new Image();
lillypadWithLillyImg.src = `${SERVER}/lillypadwlilly.png`;
let lillypadWithLillyImgLoaded = false;
lillypadWithLillyImg.onload = () => { lillypadWithLillyImgLoaded = true; };

class Lillypad {
  constructor(x, y, hasLilly) {
    this.x = x;
    this.y = y;
    this.hasLilly = hasLilly;
    this.scale = 0.15 + Math.random() * 0.1;
    this.rotation = Math.random() * Math.PI * 2;

    // Barely noticeable drift parameters
    this.driftAngle = Math.random() * Math.PI * 2;
    this.driftSpeed = 0.008 + Math.random() * 0.005;  // barely noticeable
    this.driftChangeRate = 0.0003 + Math.random() * 0.0002;

    // Very gentle bobbing
    this.bobOffset = Math.random() * Math.PI * 2;
    this.bobSpeed = 0.005 + Math.random() * 0.003;

    // Very slow rotation drift
    this.rotationSpeed = (Math.random() - 0.5) * 0.0004;
  }

  update() {
    // Drift slowly
    this.x += Math.cos(this.driftAngle) * this.driftSpeed;
    this.y += Math.sin(this.driftAngle) * this.driftSpeed;

    // Gradually change drift direction
    this.driftAngle += (Math.random() - 0.5) * this.driftChangeRate;

    // Slow rotation
    this.rotation += this.rotationSpeed;

    // Bobbing animation
    this.bobOffset += this.bobSpeed;

    // Wrap around edges with padding
    const pad = 100;
    if (this.x < -pad) this.x = W + pad;
    if (this.x > W + pad) this.x = -pad;
    if (this.y < -pad) this.y = H + pad;
    if (this.y > H + pad) this.y = -pad;
  }

  draw(ctx) {
    const img = this.hasLilly ? lillypadWithLillyImg : lillypadImg;
    const loaded = this.hasLilly ? lillypadWithLillyImgLoaded : lillypadImgLoaded;
    if (!loaded) return;

    const bob = Math.sin(this.bobOffset) * 2;
    const size = img.width * this.scale;

    ctx.save();
    ctx.translate(this.x, this.y + bob);
    ctx.rotate(this.rotation);
    ctx.drawImage(img, -size / 2, -size / 2, size, size);
    ctx.restore();
  }
}

// Create lillypads at various positions
const lillypads = [
  new Lillypad(120, 150, false),
  new Lillypad(1450, 200, true),
  new Lillypad(200, 750, true),
  new Lillypad(1380, 720, false),
  new Lillypad(80, 450, false),
  new Lillypad(1520, 480, true),
];

// ══════════════════════════════════════════════════ KOI FISH SPRITE ══
// All fish follow the same oval path, entering from the top edge.
// Each full rotation takes exactly 8 seconds using time-based animation.
// All fish share the same rotation cycle so new fish enter when school is at top.
const ROTATION_SECS = 8;
const STAGGER_ANGLE = 5 * Math.PI / 180;  // 5° offset between each fish
const STAGGER_INWARD = 70;  // pixels inward per fish

// Global rotation tracking - all fish sync to this
let globalRotationStart = null;
let lastUpdateTime = null;
let virtualElapsed = 0;  // tracks "virtual" time that can speed up

function getGlobalRotationStart() {
  if (globalRotationStart === null) {
    globalRotationStart = performance.now();
    lastUpdateTime = globalRotationStart;
  }
  return globalRotationStart;
}

function updateVirtualTime(timestamp) {
  if (lastUpdateTime === null) {
    lastUpdateTime = timestamp;
    return;
  }
  const delta = (timestamp - lastUpdateTime) / 1000;
  virtualElapsed += delta * currentSpeedMultiplier;
  lastUpdateTime = timestamp;
}

function getVirtualElapsed() {
  return virtualElapsed;
}

class KoiFish {
  constructor(fishId, img) {
    this.id  = fishId;
    this.img = img;

    // Scale to display size — vary slightly per fish for natural feel (20% larger)
    const targetW = 180 + (fishId % 4) * 22;
    this.dw = targetW;
    this.dh = Math.round(img.naturalHeight * (targetW / img.naturalWidth));

    // All fish swim on the same oval path, staggered inward so they don't overlap
    this.cx  = PATH_CX;
    this.cy  = PATH_CY;
    this.rx  = PATH_RX - (fishId - 1) * STAGGER_INWARD;
    this.ry  = PATH_RY - (fishId - 1) * (STAGGER_INWARD * 0.6);

    // Stagger angle offset (inward fish slightly behind)
    this.staggerOffset = (fishId - 1) * STAGGER_ANGLE;
    this.angle = -Math.PI / 2;

    // Body undulation (wiggle effect)
    this.wobble = 0;
    this.wobSpd = 0.06 + Math.random() * 0.02;  // slower, gentler wobble
    this.wobAmpBase = 8 + Math.random() * 3;  // base amplitude (larger wiggle)
    this.wobAmp = this.wobAmpBase;
    this.STRIPS = 16;

    // Wiggle/glide cycle for serene movement - randomized per fish
    this.isGliding = Math.random() > 0.5;  // randomly start wiggling or gliding
    this.phaseTimer = Math.random() * 180;  // random point in current phase
    this.wiggleDuration = 80 + Math.random() * 100;   // wiggle for ~1.3-3 seconds
    this.glideDuration = 100 + Math.random() * 120;   // glide for ~1.7-3.7 seconds

    // Speed variation for natural movement
    this.moveSpeed = 1.0;  // current speed multiplier (slower when wiggling, faster when gliding)
    this.angleOffset = 0;  // accumulated offset from speed variations

    // Fade in from 0→1
    this.alpha    = 0;
    this.fadingIn = true;

    this._updatePos();
  }

  _updatePos() {
    this.x = this.cx + this.rx * Math.cos(this.angle);
    this.y = this.cy + this.ry * Math.sin(this.angle);
  }

  // Direction the fish is heading (tangent to oval)
  _heading() {
    const dx = -this.rx * Math.sin(this.angle);
    const dy =  this.ry * Math.cos(this.angle);
    return Math.atan2(dy, dx);
  }

  update(timestamp) {
    if (this.fadingIn) {
      this.alpha += 0.012;
      if (this.alpha >= 1) { this.alpha = 1; this.fadingIn = false; }
    }

    // Time-based rotation synced to global cycle: 8 seconds per full rotation
    // Uses virtual elapsed time which can speed up based on sensor
    const virtualTime = getVirtualElapsed();
    const baseAngle = -Math.PI / 2 + (virtualTime / ROTATION_SECS) * (2 * Math.PI);
    this.angle = baseAngle - this.staggerOffset + this.angleOffset;

    // Wiggle/glide phase cycle
    this.phaseTimer += currentSpeedMultiplier;
    const targetSpeed = this.isGliding ? 1.15 : 0.85;  // glide faster, wiggle slower
    this.moveSpeed += (targetSpeed - this.moveSpeed) * 0.03;  // smooth transition

    if (this.isGliding) {
      // Gliding phase - smoothly reduce wobble amplitude
      this.wobAmp = Math.max(0.5, this.wobAmp * 0.96);
      if (this.phaseTimer >= this.glideDuration) {
        this.isGliding = false;
        this.phaseTimer = 0;
      }
    } else {
      // Wiggling phase - smoothly restore wobble amplitude
      this.wobAmp = this.wobAmp + (this.wobAmpBase - this.wobAmp) * 0.05;
      if (this.phaseTimer >= this.wiggleDuration) {
        this.isGliding = true;
        this.phaseTimer = 0;
      }
    }

    // Accumulate speed offset for natural catch-up behavior
    const baseSpeed = (2 * Math.PI) / (ROTATION_SECS * 60);  // radians per frame at 60fps
    this.angleOffset += (this.moveSpeed - 1.0) * baseSpeed * currentSpeedMultiplier;

    // Body undulation (wiggle effect) - gentler and calmer
    this.wobble += this.wobSpd * currentSpeedMultiplier;

    this._updatePos();
  }

  draw(ctx) {
    if (this.alpha <= 0.01) return;

    const heading = this._heading();
    const iw  = this.img.naturalWidth;
    const ih  = this.img.naturalHeight;
    const dw  = this.dw;
    const dh  = this.dh;

    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(heading);

    // ── Koi undulation: slice fish PNG into vertical strips ─────────────
    // Each strip is displaced laterally by a sine wave.
    // Amplitude grows from head (t=0, no movement) to tail (t=1, full waggle).
    const srcStripW  = iw / this.STRIPS;
    const destStripW = dw / this.STRIPS;

    for (let s = 0; s < this.STRIPS; s++) {
      const t   = s / (this.STRIPS - 1);          // 0=head, 1=tail
      const amp = this.wobAmp * (t * t * 1.2);     // quadratic: tail wags more
      const yOff = Math.sin(this.wobble - t * Math.PI * 1.8) * amp;

      ctx.drawImage(
        this.img,
        s * srcStripW,        0,            srcStripW,   ih,
        s * destStripW - dw/2, -dh/2 + yOff, destStripW, dh
      );
    }

    ctx.restore();
  }
}

// ══════════════════════════════════════════════════ FISH MANAGER ══
const fishSprites = {};    // { fishId: KoiFish }
const fishPending = {};    // { fishId: { img, showAt } }
const loadedIds   = new Set();

function loadFishPNG(fishId, base64, showAt) {
  const img = new Image();
  img.onload = () => { fishPending[fishId] = { img, showAt }; };
  img.onerror = () => console.warn(`[pond] could not load fish ${fishId} image`);
  img.src = 'data:image/png;base64,' + base64;
}

function isSchoolAtTop(timestamp) {
  if (globalRotationStart === null) return true;  // First fish can enter immediately
  const globalElapsed = (timestamp - getGlobalRotationStart()) / 1000;
  const cycleProgress = (globalElapsed % ROTATION_SECS) / ROTATION_SECS;  // 0 to 1
  // School is at top when cycleProgress is near 0 (within first 5% of cycle)
  return cycleProgress < 0.05 || cycleProgress > 0.95;
}

function checkPending(timestamp) {
  const now = Date.now();
  for (const [id, entry] of Object.entries(fishPending)) {
    // Fish must wait for entry delay AND for school to be at top
    if (now >= entry.showAt && isSchoolAtTop(timestamp)) {
      const fish = new KoiFish(parseInt(id), entry.img);
      fishSprites[id] = fish;
      delete fishPending[id];
      // Spawn ripple at fish entry position (top of its oval path)
      spawnRipple(fish.cx, fish.cy - fish.ry);
      updateUI();
      console.log(`[pond] fish ${id} entered the pond`);
    }
  }
}

function updateUI() {
  const active  = Object.keys(fishSprites).length;
  const pending = Object.keys(fishPending).length;
  document.getElementById('counter').textContent = `${active} / ${MAX_FISH} fish`;
  const anyFish = active + pending > 0;
  document.getElementById('waiting').classList.toggle('hidden', anyFish);
}

// ══════════════════════════════════════════════════ SENSOR POLLING ══
async function pollSensor() {
  try {
    const resp = await fetch(`${SERVER}/sensor`);
    if (!resp.ok) return;
    const data = await resp.json();
    const sensorValue = data.value || 0;

    // Speed up fish when sensor value exceeds threshold
    if (sensorValue > SENSOR_THRESHOLD) {
      currentSpeedMultiplier = SPEED_MULTIPLIER;
    } else {
      currentSpeedMultiplier = 1.0;
    }
  } catch (e) {
    // Sensor not available — keep normal speed
  }
}

// ══════════════════════════════════════════════════ SERVER POLLING ══
async function pollServer() {
  try {
    const resp = await fetch(`${SERVER}/get-fish`);
    if (!resp.ok) return;
    const data = await resp.json();
    const nowMs = Date.now();
    const serverIds = new Set(Object.keys(data).map(id => parseInt(id)));

    // Remove fish that no longer exist on server
    for (const id of loadedIds) {
      if (!serverIds.has(id)) {
        delete fishSprites[id];
        delete fishPending[id];
        loadedIds.delete(id);
        console.log(`[pond] fish ${id} removed from pond`);
        updateUI();
      }
    }

    // Add new fish from server
    for (const [idStr, entry] of Object.entries(data)) {
      const fishId = parseInt(idStr);
      if (loadedIds.has(fishId)) continue;
      loadedIds.add(fishId);

      // entry is { png: "base64...", timestamp: 1234567890.123 }
      const png      = entry.png      || entry;   // backwards compat if plain string
      const sentMs   = entry.timestamp ? entry.timestamp * 1000 : nowMs;
      const showAt   = sentMs + ENTRY_DELAY * 1000;
      const waitSecs = Math.max(0, (showAt - nowMs) / 1000).toFixed(1);

      console.log(`[pond] fish ${fishId} queued — appears in ${waitSecs}s`);
      loadFishPNG(fishId, typeof entry === 'string' ? entry : entry.png, Math.max(nowMs, showAt));
      updateUI();
    }
  } catch (e) {
    // Server unreachable — keep trying
  }
}

// ══════════════════════════════════════════════════ MAIN LOOP ══
function loop(ts) {
  requestAnimationFrame(loop);

  // Update virtual time (handles speed multiplier)
  getGlobalRotationStart();  // ensure initialized
  updateVirtualTime(ts);

  // ── Background ─────────────────────────────────────────────────────
  if (bgLoaded) {
    ctx.drawImage(bgImg, 0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0d2d3e');
    g.addColorStop(1, '#163e55');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // ── Ripples ──────────────────────────────────────────────────────────
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].update();
    ripples[i].draw(ctx);
    if (!ripples[i].alive) ripples.splice(i, 1);
  }

  // ── Check pending fish ready to enter ───────────────────────────────
  checkPending(ts);

  // ── Fish ──────────────────────────────────────────────────────────────
  for (const fish of Object.values(fishSprites)) {
    fish.update(ts);
    fish.draw(ctx);
  }

  // ── Lillypads ────────────────────────────────────────────────────────
  for (const pad of lillypads) {
    pad.update();
    pad.draw(ctx);
  }
}

// ══════════════════════════════════════════════════ KEYBOARD ══
document.addEventListener('keydown', e => {
  if (e.key === 'f') document.documentElement.requestFullscreen?.();
  if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();

  // R — remove last fish (fishing rod)
  if (e.key === 'r' || e.key === 'R') {
    const ids = Object.keys(fishSprites);
    if (ids.length) {
      const last = ids[ids.length - 1];
      delete fishSprites[last];
      loadedIds.delete(parseInt(last));
      updateUI();
    }
  }

  // C — clear all fish
  if (e.key === 'c' || e.key === 'C') {
    for (const id of Object.keys(fishSprites)) delete fishSprites[id];
    for (const id of Object.keys(fishPending)) delete fishPending[id];
    loadedIds.clear();
    updateUI();
  }
});

// ══════════════════════════════════════════════════ INIT ══
setInterval(pollServer, POLL_MS);
setInterval(pollSensor, SENSOR_POLL_MS);
pollServer();
pollSensor();
requestAnimationFrame(loop);
</script>
</body>
</html>
